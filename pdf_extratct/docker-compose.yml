services:

  app:
    image: pdf-extract-api:latest
    container_name: pdf-extract-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - app-uploads:/app/uploads
      - ./google-credentials.json:/app/google-credentials.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
    networks:
      - supabase_default

volumes:
  app-uploads:

# Redis, MongoDB e PostgreSQL já existem na rede supabase_default
networks:
  supabase_default:
    external: true
