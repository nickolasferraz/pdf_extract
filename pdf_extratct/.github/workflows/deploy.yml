name: Build & Deploy

# Roda quando fizer push na branch main
on:
  push:
    branches: [main]

jobs:

  # ============================================
  # Job 1: Build e Testes
  # ============================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: ./mvnw clean verify -B

  # ============================================
  # Job 2: Deploy no servidor
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pdf-extract-api:latest .

      - name: Save Docker image
        run: docker save pdf-extract-api:latest | gzip > image.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "image.tar.gz"
          target: "/tmp/"

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.yml"
          target: "${{ secrets.APP_DIR }}"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Carrega a imagem Docker no servidor
            docker load < /tmp/image.tar.gz
            rm /tmp/image.tar.gz
            
            # Vai para o diretório da aplicação
            cd ${{ secrets.APP_DIR }}
            
            # Cria o .env com os secrets do GitHub
            cat <<EOF > .env
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=6379
            REDIS_USERNAME=default
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            MONGO_USERNAME=${{ secrets.MONGO_USERNAME }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_HOST=${{ secrets.MONGO_HOST }}
            MONGO_PORT=27017
            MONGO_DATABASE=pdf_extract_logs
            MONGO_AUTH_DB=admin
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=86400000
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            MP_ACCESS_TOKEN_PROD=${{ secrets.MP_ACCESS_TOKEN_PROD }}
            MP_ACCESS_TOKEN_TEST=${{ secrets.MP_ACCESS_TOKEN_TEST }}
            MP_NOTIFICATION_URL=${{ secrets.MP_NOTIFICATION_URL }}
            MP_PUBLIC_KEY=${{ secrets.MP_PUBLIC_KEY }}
            SPRING_PROFILES_ACTIVE=prod
            HIBERNATE_DDL_AUTO=validate
            SHOW_SQL=false
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            EOF
            
            # Para containers antigos e sobe os novos
            docker compose down
            docker compose up -d
            
            # Limpa imagens antigas sem uso
            docker image prune -f
