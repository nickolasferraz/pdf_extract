# ============================================================
# DATASOURCE - H2 In-Memory
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ============================================================
# DESATIVA REDIS E MONGODB
# ============================================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration

# ============================================================
# MERCADO PAGO
# ============================================================
api.v1.mercadopago-access-token-vendedor=TEST-fake-token
api.v1.mercadopago-notification-url=http://localhost:8080/api/v1/payments/webhook

# ============================================================
# JWT
# ============================================================
api.v1.security.token.secret=test-secret-key-fake-for-tests-only

# ============================================================
# OAUTH2 (TEST MOCKS)
# ============================================================
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
