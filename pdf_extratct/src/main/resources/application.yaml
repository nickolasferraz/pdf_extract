            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/google}

  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

  ai:
    vertex:
      ai:
        gemini:
          project-id: "iotska121"
          location: "us-central1"
          chat:
            options:
              model: "gemini-2.5-flash"
              temperature: 0.1

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

