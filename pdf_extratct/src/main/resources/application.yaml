  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:8001/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:aea0d89357af91b3775c7ca4d2a99704}
    driver-class-name: org.postgresql.Driver
