      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:Y6e93GWCcuwTapQt}
      timeout: 60000
    mongodb:
      uri: mongodb://${MONGO_USERNAME:app_user}:${MONGO_PASSWORD:SB1hd18x5C43NupQ}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:pdf_extract_logs}?authSource=${MONGO_AUTH_DB:admin}

