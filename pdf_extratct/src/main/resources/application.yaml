spring:
  application:
    name: pdf_extratct

  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}
      timeout: 60000
    mongodb:
      uri: mongodb://${MONGO_USERNAME:app_user}:${MONGO_PASSWORD}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:pdf_extract_logs}?authSource=${MONGO_AUTH_DB:admin}

#  devtools:
#    livereload:
#      enabled: true
#    restart:
#      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:8001/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/google}

  servlet:
    multipart:

      max-file-size: 10GB
      max-request-size: 10GB

  ai:
    vertex:
      ai:
        gemini:
          project-id: "iotska121"
          location: "us-central1"
          chat:
            options:
              model: "gemini-2.5-flash"
              temperature: 0.1

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    max-http-form-post-size: 10GB
    max-swallow-size: 10GB
  servlet:
    session:
      tracking-modes: cookie

storage:
  location: ./uploads/

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.example.pdf_extratct: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.data.mongodb: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

api:
  v1:
    mercadopago-acess-token-prod-vendedor: ${MP_ACCESS_TOKEN_PROD}
    mercadopago-access-token-vendedor: ${MP_ACCESS_TOKEN_TEST}
    mercadopago-notification-url: ${MP_NOTIFICATION_URL:https://localhost:8080/api/v1/webhooks/mercadopago}
    mercadopago-public-key: ${MP_PUBLIC_KEY}

app:
  security:
    public-paths:
      - /api/auth/login
      - /api/auth/register
      - /login/oauth2/**
      - /oauth2/**
      - /api/public/**
      - /api/credit-packages
      - /api/credit-packages/**
      - /api/v1/payments/**
      - /api/v1/webhooks/**
      - /swagger-ui/**
      - /v3/api-docs/**
    allowed-origins:
      - http://localhost:4200
      - http://localhost:8080
      - https://www.pdftoexcel.com.br
      - ${ALLOWED_ORIGINS:}
    frontend-url: ${FRONTEND_URL:https://www.pdftoexcel.com.br}
    ip-gated-paths:
      - /api/files
      - /api/pdf-to-excel
