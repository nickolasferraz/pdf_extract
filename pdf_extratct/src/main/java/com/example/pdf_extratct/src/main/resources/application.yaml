spring:
  application:
    name: pdf_extratct

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:8001/postgres
    username: postgres
    password: aea0d89357af91b3775c7ca4d2a99704
    driver-class-name: org.postgresql.Driver
