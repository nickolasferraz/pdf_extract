            client-secret: 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
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB
    session:
      tracking-modes: cookie

  storage:
    location: ./uploads/

  ai:
    vertex:
      ai:
        gemini:
          project-id: "iotska121"
          location: "us-central1"
